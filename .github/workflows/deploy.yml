name: deploy

# Despliega en el servidor por SSH: actualiza los repos y hace docker compose up.
# Manual (Actions -> deploy -> Run workflow) o al hacer push a main.
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}            # token read-only para repos privados
          INFRA_ENV: ${{ secrets.INFRA_ENV }}          # contenido completo de nexus-infra/.env
          MICROWORKOUT_ENV: ${{ secrets.MICROWORKOUT_ENV }}  # contenido completo de python-microworkout/.env
        with:
          host: ${{ secrets.SSH_HOST || '161.35.215.164' }}
          username: ${{ secrets.SSH_USER || 'root' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: GH_TOKEN,INFRA_ENV,MICROWORKOUT_ENV
          script: |
            set -e
            # con token -> repos privados; sin token -> públicos
            if [ -n "${GH_TOKEN:-}" ]; then
              export GIT_BASE="https://x-access-token:${GH_TOKEN}@github.com/fsalom"
            else
              export GIT_BASE="https://github.com/fsalom"
            fi
            BASE="${NEXUS_DIR:-$HOME/nexus}"
            # asegura que nexus-infra está presente, luego delega en su deploy.sh
            if [ -d "$BASE/nexus-infra/.git" ]; then
              git -C "$BASE/nexus-infra" pull --ff-only
            else
              mkdir -p "$BASE"
              git clone "$GIT_BASE/nexus-infra.git" "$BASE/nexus-infra"
            fi
            bash "$BASE/nexus-infra/deploy/deploy.sh"
