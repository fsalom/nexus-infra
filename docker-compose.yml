# Nexus — despliegue conjunto de gastos, microworkout y el SSO nexus-auth en un host,
# con un Postgres COMPARTIDO (3 BBDD: microworkout, gastos, auth) y Caddy de borde.
# Requiere los repos clonados juntos: nexus-infra/ gastos-python/ python-microworkout/ nexus-auth/
name: nexus

networks:
  edge:        # Caddy <-> apps
  data:        # Postgres <-> apps

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  pg_backups:
  workout_media:
  workout_static:

services:
  # ============================================================
  # Caddy — proxy de borde: TLS automático + subdominios + SSO (forward-auth)
  # ============================================================
  caddy:
    image: caddy:2
    container_name: nexus-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?define DOMAIN en .env}
      ACME_EMAIL: ${ACME_EMAIL:?define ACME_EMAIL en .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - workout_static:/srv/workout/static:ro
      - workout_media:/srv/workout/media:ro
    networks: [edge]
    depends_on: [auth, gastos, workout-api, workout-admin]

  # ============================================================
  # PostgreSQL/PostGIS compartido (BBDD: microworkout, gastos, auth)
  # ============================================================
  db:
    image: postgis/postgis:16-3.4
    container_name: nexus-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?define POSTGRES_USER en .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD en .env}
      POSTGRES_DB: microworkout
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/initdb/99-extra-dbs.sql:/docker-entrypoint-initdb.d/99-extra-dbs.sql:ro
    networks: [data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db-backup:
    image: postgres:16-alpine
    container_name: nexus-db-backup
    restart: unless-stopped
    environment:
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_backups:/backups
    entrypoint: >
      sh -c 'while true; do
        F="/backups/$$(date -u +%Y%m%d-%H%M%S).sql.gz";
        pg_dumpall -h db | gzip > "$$F" || echo "[backup] FALLO";
        find /backups -name "*.sql.gz" -mtime +7 -delete;
        sleep 86400; done'
    depends_on:
      db: { condition: service_healthy }
    networks: [data]

  # ============================================================
  # nexus-auth — SSO (auth.$DOMAIN) — BBDD 'auth'
  # ============================================================
  auth:
    build: ../nexus-auth
    container_name: nexus-auth
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/auth"
      NEXUS_COOKIE_DOMAIN: ".${DOMAIN}"
      NEXUS_COOKIE_SECURE: "1"
      NEXUS_PUBLIC_URL: "https://auth.${DOMAIN}"
      NEXUS_ADMIN_USER: ${NEXUS_ADMIN_USER:-admin}
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD:?define NEXUS_ADMIN_PASSWORD en .env}
    depends_on:
      db: { condition: service_healthy }
    networks: [edge, data]

  # ============================================================
  # gastos — FastAPI (gastos.$DOMAIN) — BBDD 'gastos'; acceso vía SSO
  # ============================================================
  gastos:
    build: ../gastos-python
    container_name: nexus-gastos
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/gastos"
      GASTOS_CRON_TOKEN: ${GASTOS_CRON_TOKEN:-}
    depends_on:
      db: { condition: service_healthy }
    networks: [edge, data]

  # ============================================================
  # microworkout — API (FastAPI/ASGI) — BBDD 'microworkout'
  # ============================================================
  workout-api:
    build:
      context: ../python-microworkout
      dockerfile: .docker/app/Dockerfile
      target: production
    container_name: nexus-workout-api
    restart: always
    command: "uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers ${WORKERS:-2} --proxy-headers --forwarded-allow-ips=*"
    env_file: ${WORKOUT_ENV:-../python-microworkout/.env}
    environment:
      SERVICE_NAME: api
      ENVIRONMENT: production
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: microworkout
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - workout_media:/code/media
    depends_on:
      db: { condition: service_healthy }
    networks: [edge, data]

  # ============================================================
  # microworkout — Admin (Django/WSGI) — /admin y /o
  # ============================================================
  workout-admin:
    build:
      context: ../python-microworkout
      dockerfile: .docker/app/Dockerfile
      target: production
    container_name: nexus-workout-admin
    restart: always
    command: "gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --max-requests 1000 --max-requests-jitter 50"
    env_file: ${WORKOUT_ENV:-../python-microworkout/.env}
    environment:
      SERVICE_NAME: admin
      ENVIRONMENT: production
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: microworkout
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - workout_media:/code/media
      - workout_static:/code/static
    depends_on:
      db: { condition: service_healthy }
    networks: [edge, data]
